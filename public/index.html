<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achieve_it</title>
    <link rel="stylesheet" href="./css/style.css">

</head>
<body>
    
    <header class="header">

        <h1>Achive it!
        </h1>

    </header>

    <header2 class="header2">

            <button id="menuButton">
                <p>Register new game:</p>
            </button>

            <div id="sidemenu" class="menu">
                <form id="gameForm">
                    <label for="chooseGame">Wright down the videogame:</label>
                    <input type="text" id="chooseGame">
                    <p></p> <!-- liker å bruke p for mellomrom -->
                    <label for="picture">Insert image link if you want here:</label>
                    <p></p>
                    <input type="text" id="image">

                    <button id="submit">Submit</button>
                </form>
            </div>

            <button id="menuButton2">
                <p>Register new achievement:</p>
            </button>

            <div id="sidemenu2" class="menu2">

                <form id="gameForm2">
                    <label for="gameSelect">Choose the videogame that the achievement is from</label>
                    <select class="gameSelect" id="selectId">
                        <option value="">Choose game:</option>
                    </select>

                    <label for="chooseAchievemnt">Wright down the achievement:</label>
                    <input type="text" id="chooseAchievemnt">

                    <label for="description">Description:</label>
                    <input type="text" id="description">

                    <label for="imageUrl">Image URL:</label>
                    <input type="text" id="imageUrl">

                    <button id="Submit2">Submit</button>
                </form>

            </div>
            <button id="menuButton3">
                <p>Delete</p>
            </button>

            <div id="sidemenu3" class="menu3">
                <form id="gameForm3">
                    <label for="delete">Chosse what you want to delete:</label>
                    <select class="gameSelect" id="gameSelect"> <!-- Denne har id for å kunne slette og seperere fra første gameSelect -->
                        <option value="">Choose game:</option>
                    </select>

                    <select id="achiSelect">
                        <option value="">Choose Achievement:</option>
                    </select>

                    <button id="submit3">Submit</button>

                </form>

            </div>

    </header2>

    <div id="games-container"></div>

    <div id="achievements-container"></div>

    <script>
        const form = document.getElementById('gameForm');
        const form2 = document.getElementById('gameForm2')
        const form3 = document.getElementById('gameForm3')

        window.addEventListener("DOMContentLoaded", () => {
            loadGameOptions();
        });

        form.addEventListener('submit', (e)=> {
            e.preventDefault();
            submitGames();
        });

        form2.addEventListener('submit', (e)=> {
            e.preventDefault();
            submitAchievements();
        })

        form3.addEventListener('submit', (e)=> {
            e.preventDefault
            DeleteGame();
            DeleteAchievement();
        })

    </script>

    <script src="./js/achieve.js"></script>
    <script src="./js/meny.js"></script>
    
</body>
</html>
